<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<style>
    /* Your existing CSS... */
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
    }
    .login-container:hover {
        transition: all 0.3s ease-in-out;
        animation: 0.5s ease-in-out infinite;
        transform: translate(0px, 0px, 10px);
        
    }

#login-form {
    /* 1. Glass Styling */
    background: rgba(255, 255, 255, 0.121);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(244, 244, 244, 0.841);
    
    /* 2. Shape and Spacing */
    padding: 60px;
    border-radius: 30px; /* Rounded corners help with the glass look */
    width: 50%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    
    /* 3. Drop Shadow for Depth */
    box-shadow: -10px -10px 10px rgb(130, 238, 23), 10px 10px 10px rgb(0, 242, 234);
}

#login-form h2 { color: rgb(254, 11, 11); margin-bottom: 10px; text-shadow: #000000 0px 0px 3px; }

#login-form input {
    background: #333;
    border: none;
    padding: 15px;
    color: white;
    border-radius: 4px;
    font-size: 1.1rem;
    }

#login-form button {
    background-color: #1c7c9cd9;
    color: rgb(249, 249, 249);
    padding: 15px;
    border: solid transparent black;
    border-radius: 4px;
    font-weight: bolder;
    cursor: pointer;
    font-size: 1rem;
    transform: translate(0px 0px 10px);
    animation: 0.5s ease-in-out infinite;    
    }

.form-footer {
    display: flex;
    justify-content: space-between;
    font-size: 1rem;
    color: #ffffff;
    text-shadow: #000000 1px 1px 1px;
    }

    body {
    margin: 0;
    padding: 0;
    background-image: url('/images/1130469.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}
</style>
<body>

    <div class="login-container">
        <form id="login-form">
            <h2>Sign In</h2>
            <input type = "email" id = "email" placeholder = "example@gmail.com" required>
            <input type = "password" id = "password" placeholder = "Password" required>
            <button type = "submit"> Sign In </button>
            
            <div class = "form-footer">
                <label><input type = "checkbox"> Remember me</label>
                <a href = "#"> Need Help? </a>
            </div>
        </form>
    </div>

</body>
</html>
