<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
    }
    .login-container:hover {
        transition: all 0.5s ease-in-out;
        animation: neon-pulse 0.5s ease-in-out infinite;
        transform: translate(0px, 0px, 10px);
        
    }

#login-form {
    /* 1. Glass Styling */
    background: rgba(255, 255, 255, 0.121);
    -webkit-backdrop-filter: blur(5px);
    backdrop-filter:blur(5px);
    border: 1px solid rgba(244, 244, 244, 0.841);
    
    /* 2. Shape and Spacing */
    padding: 60px;
    border-radius: 30px;
    width: 50%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    
    /* 3. Drop Shadow for Depth */
     box-shadow: -8px -8px 15px rgb(255, 0, 0), 8px 8px 15px rgb(255, 0, 0);
}

#login-form h2 { color: rgb(254, 11, 11); margin-bottom: 10px; text-shadow: #000000 0px 0px 3px; }

#login-form input {
    background: #333;
    border: 1px solid rgba(255, 255, 255, 0.841);
    padding: 15px;
    color: rgb(255, 255, 255);
    border-radius: 250px;
    font-size: 1rem;
    }

#login-form button {
    background-color: #ff0101;
    color: white;
    padding: 15px;
    border: 1px solid rgba(244, 244, 244, 0.841);
    border-radius: 8px;
    font-weight: bolder;
    cursor: pointer;
    font-size: 1rem;
    
    /* 1. Link to the 'button-glow'*/
    animation: neon-pulse 2s ease-in-out infinite;
    
    /* 2. Transition for smooth hovering */
    transition: all 0.5s ease;
}

/* Optional: Make the glow even stronger when hovering */
#login-form button:hover {
    background-color: hsl(0, 81%, 36%);
    transform: scale(1.05);
    box-shadow: 5px 10px 20px hsla(0, 76%, 35%, 0.866), 5px 10px 25px #fb02ff;
}
.form-footer {
    display: flex;
    justify-content: space-between;
    font-size: 1rem;
    color: #fffbfb;
    text-shadow: #622929 1px 1px 1px;
    cursor: pointer;
    }

    body {
    margin: 0;
    padding: 0;
    background-image: url('/images/Gemini_Generated_Image_1ip6ln1ip6ln1ip6.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
}
</style>
<body>

    <div class="login-container">
        <form id="login-form" action="index.html" method="GET">
            <h2>Sign In</h2>
            <input type = "email" id = "email" placeholder = "example@gmail.com" required>
            <input type = "password" id = "password" placeholder = "Password" required>
            <button type = "submit"> Sign In </button>
            
            <div class = "form-footer">
                <label><input type = "checkbox"> Remember me</label>
                <a href = "#"> Need Help? </a>
            </div>
        </form>
    </div>

</body>
</html>
