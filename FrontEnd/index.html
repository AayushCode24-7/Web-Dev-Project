<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <input type="checkbox" id="theme-toggle">
    <label for="theme-toggle" class="theme-btn">Change Theme</label>
    <div class="layout-container">
        <nav class="sidebar">
            <h2>Netflix</h2>
            <input type="text" id="search-bar" placeholder="Search movies..." oninput="searchMovies(this.value)">
            <ul>
                <li><a href="#" onclick="showHome(); return false;">Home</a></li>
                <li><a href="#" onclick="showHome(); return false;">Movies</a></li>
                <li><a href="#" onclick="showWatchlist(); return false;">Watchlist</a></li>
            </ul>
        </nav>
        
        <main id="root"></main>
        <main id="search-root"></main>
        <main id="watchlist-root"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
